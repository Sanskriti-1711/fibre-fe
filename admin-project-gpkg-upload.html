<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Import GeoPackage | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --tm-red: #E31837;
      --tm-dark: #1F2937;
      --tm-gray: #6B7280;
      --tm-light: #F9FAFB;
      --tm-white: #FFFFFF;
      --border: #E5E7EB;
      --green: #059669;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--tm-light);
      color: var(--tm-dark);
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: var(--tm-white);
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    h1 {
      margin-bottom: 6px;
      font-size: 24px;
    }

    p {
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--tm-gray);
    }

    .section {
      margin-bottom: 28px;
    }

    .section h3 {
      margin-bottom: 12px;
      font-size: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    input[type="file"], select {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 14px;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .checkbox-group {
      margin-top: 8px;
    }

    .checkbox-group label {
      font-weight: 400;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .btn.secondary {
      background: #F3F4F6;
      color: var(--tm-dark);
    }

    .btn.primary {
      background: var(--tm-red);
      color: var(--tm-white);
    }

    .status-box {
      background: #ECFDF5;
      border-left: 4px solid var(--green);
      padding: 14px;
      font-size: 13px;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Import GeoPackage</h1>
    <p>Validate and import design layers into the compliance system</p>

    <form>

      <div class="section">
        <h3>1. Upload GeoPackage</h3>
        <input type="file" accept=".gpkg" />
      </div>

      <div class="section">
        <h3>2. Select Layers to Import</h3>

        <div class="checkbox-group">
          <label><input type="checkbox" /> poles_design</label><br />
          <label><input type="checkbox" /> fiber_routes</label><br />
          <label><input type="checkbox" /> chambers</label>
        </div>
      </div>

      <div class="section">
        <h3>3. Geometry & CRS</h3>

        <div class="options">
          <div>
            <label>Geometry Type</label>
            <select>
              <option>Point</option>
              <option>Line</option>
            </select>
          </div>

          <div>
            <label>CRS</label>
            <select>
              <option>EPSG:27700 (British National Grid)</option>
              <option>EPSG:4326 (WGS84)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>4. Validation</h3>
        <div class="status-box">
          Dry-run validation passed.  
          No geometry errors detected.
        </div>
      </div>

      <div class="actions">
        <button class="btn secondary" type="button">
          Run Dry Validation
        </button>
        <button class="btn primary" type="submit">
          Import Layers
        </button>
      </div>

    </form>
  </div>

</body>
</html>
