<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Activate Account | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="fe-accept-invite">

  <div class="layout">

    <main class="content">
      <div class="card">
        <div class="header">
          <h1>Tech Mahindra</h1>
          <p>Activate Field Engineer Account</p>
        </div>

        <form>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" value="Field Engineer Name" readonly />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" value="engineer@company.com" readonly />
          </div>

          <div class="form-group">
            <label>Create Password</label>
            <input type="password" placeholder="Enter password" />
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" />
          </div>

          <button class="submit-btn">
            Activate Account
          </button>
        </form>

        <div class="footer">
          This invite is for authorized personnel only
        </div>
      </div>
    </main>
  </div>

</body>
</html>
