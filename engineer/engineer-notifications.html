<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications</title>

  <style>
    :root {
      --tm-red:#E31837;
      --dark:#1F2937;
      --gray:#6B7280;
      --light:#F9FAFB;
      --white:#FFFFFF;
    }

    * { box-sizing:border-box; font-family:system-ui; }

    body {
      margin:0;
      background:var(--light);
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 1100;
      background: var(--dark);
      color: var(--white);
      padding: 14px 16px;
    }

    .top-bar .brand {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--tm-red);
      letter-spacing: 0.2px;
    }

    @media (max-width: 600px) {
      body {
        padding-bottom: 72px;
      }
    }

    .container {
      max-width:480px;
      margin:auto;
      padding:16px;
    }

    h1 {
      font-size:18px;
      margin-bottom:16px;
      color:var(--dark);
    }

    .notification {
      background:var(--white);
      padding:14px;
      border-radius:8px;
      margin-bottom:12px;
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
      font-size:14px;
    }

    .notification strong {
      color:var(--tm-red);
    }

    .time {
      font-size:12px;
      color:var(--gray);
      margin-top:4px;
    }

    .mobile-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64px;
      background: var(--white);
      border-top: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 10px;
      z-index: 1000;
    }

    .mobile-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
      text-decoration: none;
      min-width: 64px;
    }

    .mobile-nav a svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
    }

    .mobile-nav a:active {
      opacity: 0.8;
    }

    @media (min-width: 601px) {
      .mobile-nav {
        display: none;
      }
    }
  </style>
</head>
<body>

<header class="top-bar" role="banner">
  <h2 class="brand">Tech Mahindra</h2>
</header>

<div class="container">
  <h1>Notifications</h1>

  <div class="notification">
    <strong>Task Rejected</strong><br/>
    Pole #1022 needs clearer image
    <div class="time">10 minutes ago</div>
  </div>

  <div class="notification">
    <strong>New Assignment</strong><br/>
    Fiber Rollout – Zone B assigned
    <div class="time">Today</div>
  </div>

  <div class="notification">
    <strong>Admin Comment</strong><br/>
    Please capture base installation clearly
    <div class="time">Yesterday</div>
  </div>
</div>

<nav class="mobile-nav" aria-label="Engineer navigation">
  <a href="engineer-dashboard.html" aria-label="Dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7" />
      <path d="M9 22V12h6v10" />
      <path d="M21 22H3" />
    </svg>
    Dashboard
  </a>
  <a href="engineer-notifications.html" aria-label="Notifications">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
      <path d="M13.73 21a2 2 0 0 1-3.46 0" />
    </svg>
    Notifications
  </a>
  <a href="engineer-profile.html" aria-label="Profile">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21a8 8 0 0 0-16 0" />
      <circle cx="12" cy="7" r="4" />
    </svg>
    Profile
  </a>
  <a href="#" onclick="handleLogout(event)" aria-label="Logout">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
      <path d="M16 17l5-5-5-5" />
      <path d="M21 12H9" />
    </svg>
    Logout
  </a>
</nav>

<script src="../fiber-api.js"></script>
<script>
  window.FiberAuth.requireLogin();

  function handleLogout(e) {
    if (e) e.preventDefault();
    window.FiberAuth.clear();
    window.location.href = "index.html";
  }
</script>

</body>
</html>
