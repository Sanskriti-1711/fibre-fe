<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Engineer Login | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="engineer-login">
  <div class="layout">

    <main class="content">
      <div class="top-bar">
        <h2>Tech Mahindra</h2>
      </div>

      <div class="login-wrapper">
        <div class="login-card">
          <div class="logo">
            <h1>Tech Mahindra</h1>
            <p>Engineer Portal</p>
          </div>

          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>Email</label>
              <input id="loginEmail" type="email" placeholder="engineer@company.com" required />
            </div>

            <div class="form-group">
              <label>Password</label>
              <input id="loginPassword" type="password" placeholder="••••••••" required />
            </div>

            <button class="login-btn">Login</button>
          </form>

          <div id="loginError" style="display:none;margin-top:12px;color:#B91C1C;font-size:13px;"></div>

          <div class="footer">
            &copy; Tech Mahindra &middot; Internal Access
          </div>
        </div>
      </div>
    </main>
  </div>

<script src="../fiber-api.js"></script>
<script>
  async function handleLogin(event) {
    event.preventDefault(); // stop form reload

    const errorEl = document.getElementById("loginError");
    errorEl.style.display = "none";
    errorEl.textContent = "";

    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    try {
      const response = await window.FiberApi.login(email, password);
      const role = response && response.user && response.user.role ? response.user.role : null;
      if (role !== "ENGINEER") {
        if (window.FiberAuth && typeof window.FiberAuth.clear === "function") {
          window.FiberAuth.clear();
        }
        throw new Error("Not an engineer account");
      }
      window.location.href = "engineer-dashboard.html";
    } catch (e) {
      errorEl.textContent = e && e.message ? e.message : "Login failed";
      errorEl.style.display = "block";
    }
  }
</script>

</body>
</html>
