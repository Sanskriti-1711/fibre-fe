<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="engineer-project-map">

<div class="layout">

  <main class="content">
    <div id="map"></div>

    <div class="legend">
      <div><span class="dot pending"></span> Pending</div>
      <div><span class="dot completed"></span> Completed</div>
      <div><span class="dot rejected"></span> Rejected</div>
    </div>
  </main>
</div>

<script>
  const map = L.map('map').setView([51.5074, -0.1278], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  function goToTask(featureId) {
    window.location.href = `/engineer/projects/1/task/${featureId}`;
  }

  // Example features (replace with PostGIS GeoJSON)
  L.circleMarker([51.5074, -0.1278], { color:'#D97706', radius:7 })
    .addTo(map)
    .on('click', () => goToTask(1021));

  L.circleMarker([51.51, -0.12], { color:'#059669', radius:7 })
    .addTo(map)
    .on('click', () => goToTask(1022));
</script>

</body>
</html>
