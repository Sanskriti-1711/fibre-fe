<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Engineers | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --tm-red:#E31837;
      --tm-dark:#1F2937;
      --tm-gray:#6B7280;
      --tm-light:#F9FAFB;
      --tm-white:#FFFFFF;
      --green:#059669;
      --border:#E5E7EB;
    }

    * { box-sizing:border-box; font-family:system-ui; }

    body {
      margin:0;
      background:var(--tm-light);
      color:var(--tm-dark);
    }

    .container {
      max-width:1100px;
      margin:40px auto;
      background:var(--tm-white);
      padding:28px;
      border-radius:8px;
      box-shadow:0 10px 25px rgba(0,0,0,0.05);
    }

    h1 {
      margin-bottom:20px;
      font-size:24px;
    }

    .header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .btn {
      background:var(--tm-red);
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:6px;
      font-weight:600;
      cursor:pointer;
      font-size:14px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      padding:14px;
      border-bottom:1px solid var(--border);
      text-align:left;
    }

    th {
      color:var(--tm-gray);
      font-size:13px;
    }

    .status.active {
      color:var(--green);
      font-weight:600;
    }

    .status.inactive {
      color:var(--tm-gray);
      font-weight:600;
    }

    a {
      color:var(--tm-red);
      font-weight:600;
      text-decoration:none;
      font-size:13px;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Field Engineers</h1>
    <a href="/admin/engineers/invite" class="btn">Invite Engineer</a>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Last Active</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Arjun Patel</td>
        <td>arjun.p@company.com</td>
        <td class="status active">Active</td>
        <td>Today</td>
        <td><a href="/admin/engineers/12/activity">View Activity</a></td>
      </tr>

      <tr>
        <td>Rahul Singh</td>
        <td>rahul.s@company.com</td>
        <td class="status inactive">Inactive</td>
        <td>2 weeks ago</td>
        <td><a href="/admin/engineers/14/activity">View Activity</a></td>
      </tr>
    </tbody>
  </table>

</div>

</body>
</html>
