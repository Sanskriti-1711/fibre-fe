<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Project | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --tm-red: #E31837;
      --tm-dark: #1F2937;
      --tm-gray: #6B7280;
      --tm-light: #F9FAFB;
      --tm-white: #FFFFFF;
      --border: #E5E7EB;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--tm-light);
      color: var(--tm-dark);
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: var(--tm-dark);
      color: var(--tm-white);
      padding: 24px;
    }

    .sidebar h2 {
      margin: 0 0 32px;
      color: var(--tm-red);
      font-size: 20px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .nav-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-label {
      color: #9CA3AF;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .nav a {
      display: block;
      color: #D1D5DB;
      text-decoration: none;
      padding: 6px 0;
      font-size: 14px;
    }

    .nav a.active,
    .nav a:hover {
      color: var(--tm-white);
    }

    .content {
      flex: 1;
      padding: 32px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: var(--tm-white);
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 24px;
      color: var(--tm-gray);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .hint {
      font-size: 12px;
      color: var(--tm-gray);
      margin-top: 4px;
    }

    .submit-btn {
      display: block; 
      margin-left: auto;
      margin-top: 20px;
      padding: 12px 18px;
      background: var(--tm-red);
      color: var(--tm-white);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="layout">
  <div id="sidebarContainer"></div>

    <main class="content">
      <div class="container">
        <h1>Create New Project</h1>
        <p>Define project details</p>

        <form onsubmit="handleCreateProject(event)">
          <div class="form-group">
            <label>Project Name</label>
            <input id="projectName" type="text" placeholder="Fiber Rollout – Zone A" />
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="projectDescription" placeholder="Brief description of scope, region, and objectives"></textarea>
          </div>

          <div class="form-group">
            <label>Region</label>
            <input id="projectRegion" type="text" placeholder="London" />
          </div>

          <button class="submit-btn">Next</button>
          <div id="createProjectMsg" style="display:none;margin-top:12px;font-size:13px;"></div>
        </form>
      </div>
    </main>
  </div>

</body>
<script src="partials/sidebar-loader.js"></script>
<script>
  // Auto-detect local dev — point to local Django backend
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    window.FIBER_BASE_URL = 'http://localhost:8000';
    window.FTTH_BASE_URL = 'http://localhost:8000';
  }
</script>
<script src="fiber-api.js"></script>
<script>
  window.FiberAuth.requireLogin();

  function setCreateProjectMsg(text, isError) {
    const el = document.getElementById('createProjectMsg');
    if (!el) return;
    if (!text) {
      el.style.display = 'none';
      el.textContent = '';
      return;
    }
    el.style.display = 'block';
    el.style.color = isError ? '#B91C1C' : '#059669';
    el.textContent = text;
  }

  async function handleCreateProject(event) {
    event.preventDefault();
    setCreateProjectMsg('', false);

    const name = document.getElementById('projectName').value.trim();
    const description = document.getElementById('projectDescription').value.trim();
    const region = document.getElementById('projectRegion').value.trim();

    if (!name) {
      setCreateProjectMsg('Project name is required.', true);
      return;
    }
    if (!region) {
      setCreateProjectMsg('Region is required.', true);
      return;
    }

    const payload = {
      name: name,
      description: description || '',
      region: region
    };

    try {
      const created = await window.FiberApi.createProject(payload);
      setCreateProjectMsg('Project created successfully.', false);
      document.getElementById('projectName').value = '';
      document.getElementById('projectDescription').value = '';
      document.getElementById('projectRegion').value = '';

      const newId = created && (created.uuid || created.id || created.project_uuid || created.pk);
      if (newId) {
        window.location.href = 'gpkg-upload.html?project_id=' + encodeURIComponent(newId);
      }
    } catch (e) {
      setCreateProjectMsg(e && e.message ? e.message : 'Failed to create project.', true);
    }
  }
</script>
</html>
