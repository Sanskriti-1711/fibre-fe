<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Projects | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div class="layout">

  <div id="sidebarContainer"></div>

  <!-- Main Content -->
  <main class="content">

    <div class="header">
      <div>
        <h1>Projects</h1>
        <p>Manage and monitor all fiber rollout projects</p>
      </div>
      <a class="create-btn" href="project-create.html">Create Project</a>
    </div>

    <div class="table-card" style="margin-bottom:16px;">
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;">
        <div style="min-width:200px;">
          <label for="filterStatus" style="font-size:12px;font-weight:600;color:#6B7280;display:block;margin-bottom:6px;">Status</label>
          <select id="filterStatus" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);">
            <option value="">All</option>
            <option value="draft">Draft</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="archived">Archived</option>
          </select>
        </div>
        <div style="min-width:220px;">
          <label for="filterRegion" style="font-size:12px;font-weight:600;color:#6B7280;display:block;margin-bottom:6px;">Region</label>
          <input id="filterRegion" type="text" placeholder="London" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);" />
        </div>
        <button id="applyFilters" class="create-btn" type="button">Apply Filters</button>
        <button id="clearFilters" class="create-btn" type="button" style="background:#374151;">Clear</button>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Project Name</th>
            <th>Region</th>
            <th>Status</th>
            <th style="min-width: 160px;">Standard</th>
            <th style="min-width: 160px;">Dynamic</th>
            <th>Last Activity</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="projectsTbody">

        </tbody>
      </table>
    </div>

  </main>
</div>

</body>
<script src="partials/sidebar-loader.js"></script>
<script src="fiber-api.js"></script>
<script src="js/components/progress-bar.js"></script>
<script src="js/components/completion-card.js"></script>
<script>
  window.FiberAuth.requireLogin();

  function setProjectsError(message) {
    let el = document.getElementById('projectsError');
    if (!el) {
      el = document.createElement('div');
      el.id = 'projectsError';
      el.style.cssText = 'display:none;margin:0 0 14px;color:#B91C1C;font-size:13px;';
      const header = document.querySelector('.header');
      if (header && header.parentNode) header.parentNode.insertBefore(el, header.nextSibling);
    }

    if (!message) {
      el.style.display = 'none';
      el.textContent = '';
      return;
    }
    el.textContent = message;
    el.style.display = 'block';
  }

  function pickProjectId(p) {
    return (p && (p.uuid || p.id || p.project_uuid || p.pk)) || null;
  }

  function pickProjectName(p) {
    return (p && (p.name || p.title || p.project_name)) || '-';
  }

  function pickProjectRegion(p) {
    return (p && (p.region || p.location || p.area)) || '-';
  }

  function pickProjectStatus(p) {
    const v = (p && (p.status || p.state)) || '';
    if (!v) return 'In Progress';
    return String(v).replace(/_/g, ' ').replace(/\b\w/g, function (m) { return m.toUpperCase(); });
  }

  function pickProjectCompletion(p) {
    const v = (p && (p.completion || p.completion_percent || p.progress || p.progress_percent)) || null;
    if (v === null || v === undefined || v === '') return '-';
    const num = Number(v);
    if (!isNaN(num)) return Math.round(num) + '%';
    return String(v);
  }

  function pickProjectLastActivity(p) {
    const v = (p && (p.last_activity || p.lastActivity || p.updated_at || p.updatedAt)) || null;
    if (!v) return '-';
    try {
      const d = new Date(v);
      if (!isNaN(d.getTime())) return d.toLocaleString();
    } catch (_) {}
    return String(v);
  }

  function statusClass(status) {
    const s = String(status || '').toLowerCase();
    if (s.includes('complete')) return 'completed';
    if (s.includes('archive')) return 'archived';
    return 'in-progress';
  }

  async function loadProjects(params) {
    setProjectsError('');
    const tbody = document.getElementById('projectsTbody');
    if (!tbody) return;

    try {
      const data = params
        ? await window.FiberApi.listProjectsFiltered(params)
        : await window.FiberApi.listProjects();
      const list = Array.isArray(data) ? data : (data && Array.isArray(data.results) ? data.results : []);

      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="padding:16px;color:#6B7280;">No projects found</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      
      // Fetch completion data for all projects in parallel
      const projectsWithCompletion = await Promise.all(
        list.map(async function(p) {
          const id = pickProjectId(p);
          if (!id) return { project: p, completion: null };
          try {
            const completion = await window.FiberApi.getProjectCompletion(id);
            return { project: p, completion };
          } catch (err) {
            return { project: p, completion: null };
          }
        })
      );
      
      projectsWithCompletion.forEach(function(item) {
        const p = item.project;
        const completion = item.completion;
        const id = pickProjectId(p);
        const name = pickProjectName(p);
        const region = pickProjectRegion(p);
        const status = pickProjectStatus(p);
        const lastActivity = pickProjectLastActivity(p);
        const link = id ? ('project-details.html?project_id=' + encodeURIComponent(id)) : 'project-overview.html';
        
        // Build completion cells
        let standardCell = '<td>-</td>';
        let dynamicCell = '<td>-</td>';
        
        if (completion) {
          const standard = Number(completion.standard_completion).toFixed(1);
          const dynamic = Number(completion.dynamic_completion).toFixed(1);
          const hasWeights = completion.weights_defined;
          
          standardCell = `
            <td>
              <div style="display: flex; align-items: center; gap: 8px;">
                <div style="flex: 1; height: 6px; background: #E5E7EB; border-radius: 3px; overflow: hidden;">
                  <div style="height: 100%; width: ${standard}%; background: #3B82F6; border-radius: 3px;"></div>
                </div>
                <span style="font-size: 11px; font-weight: 600; color: #374151; min-width: 35px;">${standard}%</span>
              </div>
            </td>
          `;
          
          dynamicCell = `
            <td>
              ${hasWeights ? `
                <div style="display: flex; align-items: center; gap: 8px;">
                  <div style="flex: 1; height: 6px; background: #E5E7EB; border-radius: 3px; overflow: hidden;">
                    <div style="height: 100%; width: ${dynamic}%; background: #10B981; border-radius: 3px;"></div>
                  </div>
                  <span style="font-size: 11px; font-weight: 600; color: #10B981; min-width: 35px;">${dynamic}%</span>
                </div>
              ` : '<span style="font-size: 11px; color: #9CA3AF;">No weights</span>'}
            </td>
          `;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = ''
          + '<td>' + escapeHtml(name) + '</td>'
          + '<td>' + escapeHtml(region) + '</td>'
          + '<td class="status ' + statusClass(status) + '">' + escapeHtml(status) + '</td>'
          + standardCell
          + dynamicCell
          + '<td>' + escapeHtml(lastActivity) + '</td>'
          + '<td><a class="action-link" href="projects-completion.html?project_id=' + encodeURIComponent(id || '') + '">Details</a><button class="action-link delete-btn" data-id="' + escapeHtml(id) + '" style="cursor:pointer;margin-left:15px;background:none;border:none;padding:0;font:inherit;color:inherit;">Delete</button></td>';
        tbody.appendChild(tr);
      });

      // Attach delete handlers
      tbody.querySelectorAll('.delete-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          const projectId = e.target.getAttribute('data-id');
          if (projectId && confirm('Are you sure you want to delete this project?')) {
            handleDeleteProject(projectId);
          }
        });
      });
    } catch (e) {
      setProjectsError(e && e.message ? e.message : 'Failed to load projects');
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function getFilterParams() {
    const status = document.getElementById('filterStatus');
    const region = document.getElementById('filterRegion');
    return {
      status: status ? status.value : '',
      region: region ? region.value.trim() : ''
    };
  }

  const applyBtn = document.getElementById('applyFilters');
  const clearBtn = document.getElementById('clearFilters');

  if (applyBtn) {
    applyBtn.addEventListener('click', function () {
      loadProjects(getFilterParams());
    });
  }

  if (clearBtn) {
    clearBtn.addEventListener('click', function () {
      const status = document.getElementById('filterStatus');
      const region = document.getElementById('filterRegion');
      if (status) status.value = '';
      if (region) region.value = '';
      loadProjects();
    });
  }

  async function handleDeleteProject(projectId) {
    try {
      await window.FiberApi.deleteProject(projectId);
      window.location.reload();
    } catch (e) {
      setProjectsError(e && e.message ? e.message : 'Failed to delete project');
    }
  }

  loadProjects();
</script>
</html>
