<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project Overview | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>

  <link rel="stylesheet" href="css/main.css" />
  <style>
    :root {
      --tm-red: #E31837;
      --tm-dark: #1F2937;
      --tm-gray: #6B7280;
      --tm-light: #F9FAFB;
      --tm-white: #FFFFFF;
      --border: #E5E7EB;
      --green: #059669;
      --amber: #D97706;
      --blue: #0EA5E9;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--tm-light);
      color: var(--tm-dark);
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .content {
      flex: 1;
      padding: 32px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
    }

    .header p {
      margin-top: 6px;
      color: var(--tm-gray);
      font-size: 14px;
    }

    .project-meta {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--tm-gray);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--tm-white);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    #map {
      height: 400px;
      border-radius: 8px;
      overflow: hidden;
    }

    .layer-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .layer-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #F3F4F6;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .layer-item:hover {
      background: #E5E7EB;
    }

    .layer-item.active {
      border-color: var(--tm-red);
      background: #FEF2F2;
    }

    .layer-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .status-list {
      display: grid;
      gap: 12px;
      font-size: 13px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .status-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-badge.completed {
      background: #D1FAE5;
      color: #065F46;
    }

    .status-badge.pending {
      background: #FEF3C7;
      color: #92400E;
    }

    .status-badge.failed {
      background: #FEE2E2;
      color: #991B1B;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--tm-red);
      color: white;
    }

    .btn-primary:hover {
      background: #C41230;
    }

    .feature-count {
      font-size: 12px;
      color: var(--tm-gray);
      margin-left: auto;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tm-gray);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .view-all-section {
      margin-top: 16px;
      text-align: right;
    }
  </style>
</head>
<body>

<div class="layout">

  <div id="sidebarContainer"></div>

  <main class="content">
    <div class="container">

      <!-- Header -->
      <div class="header">
        <h1 id="projectTitle">Project Overview</h1>
        <p id="projectSubtitle">Select a project to view details</p>
        <div class="project-meta">
          <div class="meta-item">
            <span class="meta-label">Project ID</span>
            <span id="projectId" class="meta-value">--</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Region</span>
            <span id="projectRegion" class="meta-value">--</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Total Features</span>
            <span id="projectTotal" class="meta-value">--</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Completion</span>
            <span id="projectCompletion" class="meta-value">--</span>
          </div>
        </div>
      </div>

      <!-- Main Grid -->
      <div class="grid">

        <!-- Left Column: Map -->
        <div class="card">
          <h3>Project Preview</h3>
          <div id="map"></div>
        </div>

        <!-- Right Column: Layers & Details -->
        <div>
          <!-- Layers Section -->
          <div class="card">
            <h3>Layers</h3>
            <div class="section-title">Select a layer to view details</div>
            <div id="layerList" class="layer-list">
              <span style="color: var(--tm-gray); font-size: 13px;">No layers available</span>
            </div>
          </div>

          <!-- Selected Layer Details -->
          <div class="card">
            <h3 id="selectedLayerTitle">Feature Details</h3>
            <div id="layerDetails" class="status-list">
              <div class="status-item">
                <span>Layer</span>
                <span id="detailLayerName">--</span>
              </div>
              <div class="status-item">
                <span>Total Features</span>
                <span id="detailFeatureCount">--</span>
              </div>
              <div class="status-item">
                <span>Completed</span>
                <span id="detailCompleted" class="status-badge completed">0</span>
              </div>
              <div class="status-item">
                <span>Pending</span>
                <span id="detailPending" class="status-badge pending">0</span>
              </div>
              <div class="status-item">
                <span>Failed</span>
                <span id="detailFailed" class="status-badge failed">0</span>
              </div>
            </div>
            <div class="view-all-section">
              <a id="viewAllBtn" href="#" class="btn btn-primary">View All Features</a>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

</div>

</body>
<script src="partials/sidebar-loader.js"></script>
<script src="fiber-api.js"></script>
<script>
  window.FiberAuth.requireLogin();

  const map = L.map('map').setView([51.5074, -0.1278], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const layerList = document.getElementById('layerList');
  const selectedLayerTitle = document.getElementById('selectedLayerTitle');
  const detailLayerName = document.getElementById('detailLayerName');
  const detailFeatureCount = document.getElementById('detailFeatureCount');
  const detailCompleted = document.getElementById('detailCompleted');
  const detailPending = document.getElementById('detailPending');
  const detailFailed = document.getElementById('detailFailed');
  const viewAllBtn = document.getElementById('viewAllBtn');

  const layerPalette = ['#0EA5E9', '#10B981', '#F59E0B', '#6366F1', '#EF4444', '#14B8A6', '#8B5CF6', '#EC4899'];

  let currentProject = null;
  let currentLayers = [];
  let selectedLayer = null;
  let overlayGroups = [];

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function pickProjectId(p) {
    return (p && (p.uuid || p.id || p.project_uuid || p.pk)) || null;
  }

  function pickProjectName(p) {
    return (p && (p.name || p.title || p.project_name)) || 'Project Overview';
  }

  function pickProjectSubtitle(p) {
    const region = (p && (p.region || p.location || p.area)) || '';
    const desc = (p && (p.description || p.summary)) || '';
    if (desc && region) return desc + ' · ' + region;
    return desc || region || 'Project overview powered by PostGIS';
  }

  function formatNumber(v) {
    const num = Number(v);
    return !isNaN(num) ? num.toLocaleString() : String(v);
  }

  function formatPercent(v) {
    const num = Number(v);
    return !isNaN(num) ? Math.round(num) + '%' : String(v);
  }

  function clearView() {
    overlayGroups.forEach(function (group) {
      map.removeLayer(group);
    });
    overlayGroups = [];
    layerList.innerHTML = '<span style="color: var(--tm-gray); font-size: 13px;">No layers available</span>';
    selectedLayer = null;
    updateLayerDetails();
  }

  function updateLayerDetails() {
    if (!selectedLayer) {
      selectedLayerTitle.textContent = 'Feature Details';
      detailLayerName.textContent = '--';
      detailFeatureCount.textContent = '--';
      detailCompleted.textContent = '0';
      detailPending.textContent = '0';
      detailFailed.textContent = '0';
      viewAllBtn.href = '#';
      return;
    }

    selectedLayerTitle.textContent = selectedLayer.name + ' Details';
    detailLayerName.textContent = selectedLayer.name;
    detailFeatureCount.textContent = formatNumber(selectedLayer.features ? selectedLayer.features.length : 0);

    const completed = selectedLayer.features ? selectedLayer.features.filter(f => f.status === 'Completed').length : 0;
    const pending = selectedLayer.features ? selectedLayer.features.filter(f => f.status === 'Pending').length : 0;
    const failed = selectedLayer.features ? selectedLayer.features.filter(f => f.status === 'Failed').length : 0;

    detailCompleted.textContent = formatNumber(completed);
    detailPending.textContent = formatNumber(pending);
    detailFailed.textContent = formatNumber(failed);

    if (currentProject) {
      const projectId = pickProjectId(currentProject);
      viewAllBtn.href = 'project-feature-management.html?project=' + encodeURIComponent(projectId || '');
    }
  }

  function selectLayer(layer, layerEl) {
    document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('active'));
    layerEl.classList.add('active');
    selectedLayer = layer;
    updateLayerDetails();

    overlayGroups.forEach(function (group) {
      map.removeLayer(group);
    });

    const group = overlayGroups.find(g => g.layerName === layer.name);
    if (group) {
      group.addTo(map);
      if (group.markers && group.markers.length) {
        const bounds = L.featureGroup(group.markers).getBounds();
        map.fitBounds(bounds, { padding: [20, 20] });
      }
    }
  }

  function renderLayers(layers) {
    layerList.innerHTML = '';
    currentLayers = layers || [];

    if (!currentLayers.length) {
      layerList.innerHTML = '<span style="color: var(--tm-gray); font-size: 13px;">No layers available</span>';
      return;
    }

    const markers = [];

    currentLayers.forEach(function (layerInfo, index) {
      const color = layerPalette[index % layerPalette.length];

      const layerEl = document.createElement('div');
      layerEl.className = 'layer-item';
      layerEl.innerHTML = '<span class="layer-color" style="background: ' + color + '"></span><span>' + layerInfo.name + '</span>';
      layerEl.addEventListener('click', function () {
        selectLayer(layerInfo, layerEl);
      });
      layerList.appendChild(layerEl);

      const group = L.layerGroup();
      group.layerName = layerInfo.name;
      group.markers = [];

      if (layerInfo.features) {
        layerInfo.features.forEach(function (feature) {
          const marker = L.circleMarker(feature.coords, {
            radius: 6,
            color: color,
            fillOpacity: 0.85
          });
          marker.bindPopup('<strong>' + feature.name + '</strong><br/>Status: ' + feature.status);
          marker.addTo(group);
          group.markers.push(marker);
        });
      }

      overlayGroups.push(group);
    });

    if (currentLayers.length > 0) {
      const firstLayerEl = layerList.querySelector('.layer-item');
      if (firstLayerEl) {
        selectLayer(currentLayers[0], firstLayerEl);
      }
    }
  }

  async function loadProjectOverview() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) return;

    try {
      const project = await window.FiberApi.getProject(id);
      currentProject = project;

      const name = pickProjectName(project);
      const subtitle = pickProjectSubtitle(project);
      const projectId = pickProjectId(project);

      setText('projectTitle', name);
      setText('projectSubtitle', subtitle);
      setText('projectId', projectId || '--');
      setText('projectRegion', (project && (project.region || project.location || project.area)) || '--');

      const total = project && (project.total_features || project.feature_total || project.total);
      const completion = project && (project.completion || project.completion_percent || project.progress || project.progress_percent);

      setText('projectTotal', total !== undefined ? formatNumber(total) : '--');
      setText('projectCompletion', completion !== undefined ? formatPercent(completion) : '--');

      if (project && project.layers) {
        renderLayers(project.layers);
      } else {
        clearView();
      }
    } catch (_) {
      clearView();
    }
  }

  loadProjectOverview();
</script>
</html>
