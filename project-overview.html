<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project Overview | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div class="layout">

  <div id="sidebarContainer"></div>

  <main class="content">
    <div class="container">

      <!-- Header -->
      <div class="header">
        <h1 id="projectTitle">Fiber Rollout – Zone A</h1>
        <p id="projectSubtitle">Project overview powered by PostGIS</p>
      </div>

      <!-- KPI Cards -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-title">Completion</div>
          <div id="kpiCompletion" class="kpi-value">78%</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-title">Total Features</div>
          <div id="kpiTotal" class="kpi-value">1,240</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-title">Completed</div>
          <div id="kpiCompleted" class="kpi-value">968</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-title">Pending / Failed</div>
          <div id="kpiPending" class="kpi-value">272</div>
        </div>
      </div>

      <!-- Main Grid -->
      <div class="grid">

        <!-- Status Summary -->
        <div class="card">
          <h3>Feature Status Breakdown</h3>

          <div class="status-list">
            <div class="status-item">
              <span>Total Features</span>
              <span id="statusTotal">1,240</span>
            </div>

            <div class="status-item">
              <span>Completed</span>
              <span id="statusCompleted" class="completed">968</span>
            </div>

            <div class="status-item">
              <span>Pending</span>
              <span id="statusPending" class="pending">214</span>
            </div>

            <div class="status-item">
              <span>Failed</span>
              <span id="statusFailed" class="failed">58</span>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

</div>

</body>
<script src="partials/sidebar-loader.js"></script>
<script src="fiber-api.js"></script>
<script>
  window.FiberAuth.requireLogin();

  function setText(id, value) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = value;
  }

  function pickProjectId(p) {
    return (p && (p.uuid || p.id || p.project_uuid || p.pk)) || null;
  }

  function pickProjectName(p) {
    return (p && (p.name || p.title || p.project_name)) || 'Project Overview';
  }

  function pickProjectSubtitle(p) {
    const region = (p && (p.region || p.location || p.area)) || '';
    const desc = (p && (p.description || p.summary)) || '';
    if (desc && region) return desc + ' · ' + region;
    return desc || region || 'Project overview powered by PostGIS';
  }

  function pickNumber(p, keys) {
    for (var i = 0; i < keys.length; i++) {
      const key = keys[i];
      if (p && p[key] !== undefined && p[key] !== null && p[key] !== '') {
        return p[key];
      }
    }
    return null;
  }

  function formatNumber(v) {
    const num = Number(v);
    if (!isNaN(num)) return num.toLocaleString();
    return String(v);
  }

  function formatPercent(v) {
    const num = Number(v);
    if (!isNaN(num)) return Math.round(num) + '%';
    return String(v);
  }

  async function loadProjectOverview() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) return;

    try {
      const project = await window.FiberApi.getProject(id);
      const name = pickProjectName(project);
      const subtitle = pickProjectSubtitle(project);

      setText('projectTitle', name);
      setText('projectSubtitle', subtitle);

      const total = pickNumber(project, ['total_features', 'feature_total', 'total']);
      const completed = pickNumber(project, ['completed_features', 'completed', 'done']);
      const pending = pickNumber(project, ['pending_features', 'pending']);
      const failed = pickNumber(project, ['failed_features', 'failed']);
      const completion = pickNumber(project, ['completion', 'completion_percent', 'progress', 'progress_percent']);

      if (completion !== null) setText('kpiCompletion', formatPercent(completion));
      if (total !== null) {
        setText('kpiTotal', formatNumber(total));
        setText('statusTotal', formatNumber(total));
      }
      if (completed !== null) {
        setText('kpiCompleted', formatNumber(completed));
        setText('statusCompleted', formatNumber(completed));
      }
      if (pending !== null) {
        setText('kpiPending', formatNumber(pending));
        setText('statusPending', formatNumber(pending));
      }
      if (failed !== null) {
        setText('statusFailed', formatNumber(failed));
      }
    } catch (_) {}
  }

  loadProjectOverview();
</script>
</html>
