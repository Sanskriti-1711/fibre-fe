<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications</title>

  <style>
    :root {
      --tm-red:#E31837;
      --dark:#1F2937;
      --gray:#6B7280;
      --light:#F9FAFB;
      --white:#FFFFFF;
    }

    * { box-sizing:border-box; font-family:system-ui; }

    body {
      margin:0;
      background:var(--light);
    }

    .container {
      max-width:480px;
      margin:auto;
      padding:16px;
    }

    h1 {
      font-size:18px;
      margin-bottom:16px;
      color:var(--dark);
    }

    .notification {
      background:var(--white);
      padding:14px;
      border-radius:8px;
      margin-bottom:12px;
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
      font-size:14px;
    }

    .notification strong {
      color:var(--tm-red);
    }

    .time {
      font-size:12px;
      color:var(--gray);
      margin-top:4px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Notifications</h1>

  <div class="notification">
    <strong>Task Rejected</strong><br/>
    Pole #1022 needs clearer image
    <div class="time">10 minutes ago</div>
  </div>

  <div class="notification">
    <strong>New Assignment</strong><br/>
    Fiber Rollout – Zone B assigned
    <div class="time">Today</div>
  </div>

  <div class="notification">
    <strong>Admin Comment</strong><br/>
    Please capture base installation clearly
    <div class="time">Yesterday</div>
  </div>
</div>

</body>
</html>
