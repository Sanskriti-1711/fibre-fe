<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Invite Engineer | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --tm-red:#E31837;
      --tm-dark:#1F2937;
      --tm-gray:#6B7280;
      --tm-light:#F9FAFB;
      --tm-white:#FFFFFF;
      --border:#E5E7EB;
    }

    * { box-sizing:border-box; font-family:system-ui; }

    body {
      margin:0;
      background:var(--tm-light);
      color:var(--tm-dark);
    }

    .layout {
      display:flex;
      min-height:100vh;
    }

    .sidebar {
      width:240px;
      background:var(--tm-dark);
      color:var(--tm-white);
      padding:24px;
    }

    .sidebar h2 {
      margin:0 0 32px;
      color:var(--tm-red);
      font-size:20px;
    }

    .nav {
      display:flex;
      flex-direction:column;
      gap:24px;
    }

    .nav-section {
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .nav-label {
      color:#9CA3AF;
      font-size:12px;
      font-weight:600;
      letter-spacing:0.08em;
      text-transform:uppercase;
      margin-bottom:4px;
    }

    .nav a {
      display:block;
      color:#D1D5DB;
      text-decoration:none;
      padding:6px 0;
      font-size:14px;
    }

    .nav a.active,
    .nav a:hover {
      color:var(--tm-white);
    }

    .content {
      flex:1;
      padding:32px;
      display:flex;
      justify-content:center;
    }

    .container {
      width:100%;
      max-width:520px;
      background:var(--tm-white);
      padding:32px;
      border-radius:8px;
      box-shadow:0 10px 25px rgba(0,0,0,0.05);
    }

    h1 {
      font-size:22px;
      margin-bottom:8px;
    }

    p {
      font-size:14px;
      color:var(--tm-gray);
      margin-bottom:24px;
    }

    label {
      display:block;
      font-size:14px;
      margin-bottom:6px;
    }

    input, select {
      width:100%;
      padding:12px;
      border-radius:6px;
      border:1px solid var(--border);
      font-size:14px;
      margin-bottom:18px;
    }

    button {
      width:100%;
      background:var(--tm-red);
      color:#fff;
      padding:12px;
      border:none;
      border-radius:6px;
      font-weight:600;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="layout">

    <div id="sidebarContainer"></div>

  <main class="content">
    <div class="container">
      <h1>Invite Field Engineer</h1>
      <p>An invite email will be sent with an activation link</p>

      <form onsubmit="handleInvite(event)">
        <label>Full Name</label>
        <input id="inviteFullName" type="text" placeholder="John Doe" required />

        <label>Email Address</label>
        <input id="inviteEmail" type="email" placeholder="engineer@company.com" required />

        <label>Temporary Password</label>
        <input id="invitePassword" type="password" placeholder="Pass@12345" required />

        <label>Role</label>
        <select>
          <option>Field Engineer</option>
        </select>

        <button>Send Invite</button>
      </form>

      <div id="inviteMsg" style="display:none;margin-top:12px;font-size:13px;"></div>
    </div>
  </main>

</div>

</body>
<script src="fiber-api.js"></script>
<script src="partials/sidebar-loader.js"></script>
<script>
  window.FiberAuth.requireLogin();

  function handleLogout(e) {
    if (e) e.preventDefault();
    window.FiberAuth.clear();
    window.location.href = "index.html";
  }

  function setInviteMsg(text, isError) {
    const el = document.getElementById("inviteMsg");
    if (!text) {
      el.style.display = "none";
      el.textContent = "";
      return;
    }
    el.style.display = "block";
    el.style.color = isError ? "#B91C1C" : "#059669";
    el.textContent = text;
  }

  async function handleInvite(event) {
    event.preventDefault();
    setInviteMsg("", false);

    const fullName = document.getElementById("inviteFullName").value.trim();
    const email = document.getElementById("inviteEmail").value.trim();
    const password = document.getElementById("invitePassword").value;

    try {
      await window.FiberApi.createEngineer(email, password, "ENGINEER", fullName);
      setInviteMsg("Engineer created successfully", false);
      document.getElementById("inviteFullName").value = "";
      document.getElementById("inviteEmail").value = "";
      document.getElementById("invitePassword").value = "";
    } catch (e) {
      setInviteMsg(e && e.message ? e.message : "Failed to create engineer", true);
    }
  }
</script>
</html>
