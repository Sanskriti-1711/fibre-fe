<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reports | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --tm-red:#E31837;
      --tm-dark:#1F2937;
      --tm-gray:#6B7280;
      --tm-light:#F9FAFB;
      --tm-white:#FFFFFF;
      --border:#E5E7EB;
    }

    * { box-sizing:border-box; font-family:system-ui; }

    body {
      margin:0;
      background:var(--tm-light);
      color:var(--tm-dark);
    }

    .container {
      max-width:900px;
      margin:40px auto;
      background:var(--tm-white);
      padding:32px;
      border-radius:8px;
      box-shadow:0 10px 25px rgba(0,0,0,0.05);
    }

    h1 {
      font-size:24px;
      margin-bottom:8px;
    }

    p {
      font-size:14px;
      color:var(--tm-gray);
      margin-bottom:24px;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:28px;
    }

    label {
      display:block;
      font-size:14px;
      margin-bottom:6px;
    }

    input, select {
      width:100%;
      padding:12px;
      border-radius:6px;
      border:1px solid var(--border);
      font-size:14px;
    }

    .actions {
      display:flex;
      gap:12px;
      margin-top:12px;
    }

    .btn {
      padding:12px 16px;
      border-radius:6px;
      border:none;
      font-weight:600;
      cursor:pointer;
      font-size:14px;
    }

    .csv {
      background:#F3F4F6;
      color:var(--tm-dark);
    }

    .pdf {
      background:var(--tm-red);
      color:#fff;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Reports & Exports</h1>
  <p>Generate audit-ready reports for compliance and review</p>

  <form>

    <div class="grid">
      <div>
        <label>Project</label>
        <select>
          <option>All Projects</option>
          <option>Fiber Rollout – Zone A</option>
          <option>Metro Expansion – Phase 2</option>
        </select>
      </div>

      <div>
        <label>Engineer</label>
        <select>
          <option>All Engineers</option>
          <option>Arjun Patel</option>
          <option>Rahul Singh</option>
        </select>
      </div>

      <div>
        <label>Start Date</label>
        <input type="date" />
      </div>

      <div>
        <label>End Date</label>
        <input type="date" />
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn csv">Export CSV</button>
      <button type="button" class="btn pdf">Export PDF (Audit)</button>
    </div>

  </form>
</div>

</body>
</html>
