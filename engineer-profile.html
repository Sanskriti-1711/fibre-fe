<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>

  <style>
    :root {
      --tm-red:#E31837;
      --dark:#1F2937;
      --gray:#6B7280;
      --light:#F9FAFB;
      --white:#FFFFFF;
      --border:#E5E7EB;
    }

    * { box-sizing:border-box; font-family:system-ui; }

    body {
      margin:0;
      background:var(--light);
      color:var(--dark);
    }

    .container {
      max-width:480px;
      margin:auto;
      padding:16px;
    }

    h1 {
      font-size:18px;
      margin-bottom:16px;
    }

    .card {
      background:var(--white);
      padding:16px;
      border-radius:8px;
      margin-bottom:14px;
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
    }

    label {
      font-size:13px;
      display:block;
      margin-bottom:4px;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:12px;
      border-radius:6px;
      border:1px solid var(--border);
      font-size:14px;
    }

    button {
      width:100%;
      padding:12px;
      background:var(--tm-red);
      color:#fff;
      border:none;
      border-radius:8px;
      font-weight:600;
      font-size:14px;
      cursor:pointer;
    }

    .meta {
      font-size:13px;
      color:var(--gray);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>My Profile</h1>

  <div class="card">
    <label>Name</label>
    <input type="text" value="Arjun Patel" disabled />

    <label>Email</label>
    <input type="email" value="arjun.p@company.com" disabled />
  </div>

  <div class="card">
    <label>New Password</label>
    <input type="password" placeholder="Enter new password" />

    <label>Confirm Password</label>
    <input type="password" placeholder="Confirm password" />

    <button>Change Password</button>
  </div>

  <div class="card">
    <strong>Device Info</strong>
    <div class="meta">Browser: Chrome (Android)</div>
    <div class="meta">Last Sync: Today</div>
  </div>
</div>

</body>
</html>
