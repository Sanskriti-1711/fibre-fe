<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audit Review | Tech Mahindra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --tm-red: #E31837;
      --tm-dark: #1F2937;
      --tm-gray: #6B7280;
      --tm-light: #F9FAFB;
      --tm-white: #FFFFFF;
      --green: #059669;
      --amber: #D97706;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--tm-light);
      color: var(--tm-dark);
    }

    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--tm-white);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin-bottom: 12px;
      font-size: 16px;
    }

    .image-box {
      height: 240px;
      background: #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--tm-gray);
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    td {
      padding: 8px 0;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .approve { background: var(--green); color: white; }
    .reject { background: var(--tm-red); color: white; }
    .rework { background: var(--amber); color: white; }

    textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: 1px solid #E5E7EB;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Audit Review – Feature #1021</h1>

  <!-- Images -->
  <div class="grid">
    <div class="card">
      <h3>Expected (Design)</h3>
      <div class="image-box">Design Image</div>
    </div>

    <div class="card">
      <h3>Actual (Field Upload)</h3>
      <div class="image-box">Captured Image</div>
    </div>
  </div>

  <!-- Metadata -->
  <div class="card">
    <h3>Metadata Comparison</h3>
    <table>
      <tr><td>Filename</td><td>IMG_1021.jpg</td></tr>
      <tr><td>Latitude / Longitude</td><td>51.5074, -0.1278</td></tr>
      <tr><td>Timestamp</td><td>2026-01-30 14:12</td></tr>
    </table>

    <textarea placeholder="Comments for field engineer (optional)"></textarea>

    <div class="actions">
      <button class="btn approve">Approve</button>
      <button class="btn reject">Reject</button>
      <button class="btn rework">Needs Rework</button>
    </div>
  </div>

</div>

</body>
</html>
